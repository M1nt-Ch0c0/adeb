name: lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck (error severity)
        run: |
          # Lint every tracked file that starts with a bash/sh shebang.
          mapfile -t FILES < <(git ls-files | while IFS= read -r f; do
            head -1 "$f" 2>/dev/null | grep -qE '^#!.*(bash|sh)\b' && printf '%s\n' "$f"
          done)
          printf 'Linting %d shell scripts:\n' "${#FILES[@]}"
          printf '  %s\n' "${FILES[@]}"
          # SC1090/SC1091: shellcheck cannot follow runtime `source` paths — noise here.
          shellcheck --severity=error -e SC1090,SC1091 "${FILES[@]}"
